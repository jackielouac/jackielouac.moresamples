<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>🎮 JACKIE & GELIC ARCADE ULTRA</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:
radial-gradient(circle at top left,#ec489955,transparent 30%),
radial-gradient(circle at top right,#8b5cf655,transparent 30%),
linear-gradient(135deg,#020617,#111827,#312e81,#7e22ce);
min-height:100vh;
overflow-x:hidden;
color:white;
}

.glass{
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.12);
box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.gradient{
background:linear-gradient(90deg,#fff,#f9a8d4,#c084fc,#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.card{
transition:.25s;
cursor:pointer;
}

.card:hover{
transform:translateY(-6px) scale(1.03);
}

canvas{
width:100%;
max-width:1100px;
aspect-ratio:16/9;
background:#020617;
border-radius:24px;
display:block;
margin:auto;
border:2px solid rgba(255,255,255,.08);
touch-action:none;
}

.btn{
padding:12px 18px;
border-radius:18px;
font-weight:800;
transition:.2s;
border:none;
color:white;
}

.btn:active{
transform:scale(.95);
}

.mobile-controls{
display:grid;
grid-template-columns:repeat(3,70px);
gap:10px;
justify-content:center;
margin-top:20px;
}

.control-btn{
width:70px;
height:70px;
border:none;
border-radius:18px;
font-size:24px;
background:rgba(255,255,255,.12);
color:white;
}

.control-btn:active{
transform:scale(.9);
background:#ec4899;
}

.empty{
visibility:hidden;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:15px;
margin-top:18px;
}

@media(max-width:768px){

h1{
font-size:30px !important;
}

.control-btn{
width:60px;
height:60px;
font-size:20px;
}

}

</style>
</head>

<body>

<section id="menu" class="min-h-screen flex items-center justify-center p-4">

<div class="glass rounded-[30px] p-5 w-full max-w-7xl">

<div class="text-center">

<div class="text-7xl">🎮</div>

<h1 class="text-6xl font-black gradient mt-3">
JACKIE & GELIC ARCADE ULTRA
</h1>

<p class="text-white/70 mt-4">
Smooth Games • Mobile Friendly • Working Games
</p>

</div>

<div class="grid md:grid-cols-3 lg:grid-cols-4 gap-5 mt-10">

<div class="card glass rounded-3xl p-5 text-center" onclick="startGame('space')">
<div class="text-6xl">🚀</div>
<h2 class="text-2xl font-black mt-2">Space</h2>
</div>

<div class="card glass rounded-3xl p-5 text-center" onclick="startGame('car')">
<div class="text-6xl">🏎️</div>
<h2 class="text-2xl font-black mt-2">Car</h2>
</div>

<div class="card glass rounded-3xl p-5 text-center" onclick="startGame('snake')">
<div class="text-6xl">🐍</div>
<h2 class="text-2xl font-black mt-2">Snake</h2>
</div>

<div class="card glass rounded-3xl p-5 text-center" onclick="startGame('brick')">
<div class="text-6xl">🧱</div>
<h2 class="text-2xl font-black mt-2">Brick</h2>
</div>

<div class="card glass rounded-3xl p-5 text-center" onclick="startGame('pong')">
<div class="text-6xl">🏓</div>
<h2 class="text-2xl font-black mt-2">Pong</h2>
</div>

<div class="card glass rounded-3xl p-5 text-center" onclick="startGame('combat')">
<div class="text-6xl">⚔️</div>
<h2 class="text-2xl font-black mt-2">Combat</h2>
</div>

<div class="card glass rounded-3xl p-5 text-center" onclick="startGame('runner')">
<div class="text-6xl">🏃</div>
<h2 class="text-2xl font-black mt-2">Runner</h2>
</div>

<div class="card glass rounded-3xl p-5 text-center" onclick="startGame('catch')">
<div class="text-6xl">🍎</div>
<h2 class="text-2xl font-black mt-2">Catch</h2>
</div>

</div>

</div>

</section>

<section id="game" class="hidden p-4 min-h-screen">

<div class="glass rounded-[30px] p-4 max-w-7xl mx-auto">

<div class="flex flex-wrap gap-3 justify-between items-center mb-5">

<div>

<h1 id="gameTitle" class="text-4xl font-black gradient">
GAME
</h1>

<p class="text-white/60">
Smooth Gameplay Experience
</p>

</div>

<div class="flex flex-wrap gap-2">

<button class="btn bg-blue-500" onclick="restartGame()">
🔄 Restart
</button>

<button class="btn bg-yellow-500 text-black" onclick="togglePause()">
⏸ Pause
</button>

<button class="btn bg-green-500" onclick="slowMode()">
🐢 Slow
</button>

<button class="btn bg-pink-500" onclick="speedMode()">
⚡ Speed
</button>

<button class="btn bg-red-500" onclick="goMenu()">
🏠 Menu
</button>

</div>

</div>

<canvas id="canvas" width="1100" height="620"></canvas>

<div class="mobile-controls">

<div class="empty"></div>

<button class="control-btn"
ontouchstart="pressKey('ArrowUp')"
ontouchend="releaseKey('ArrowUp')">
⬆️
</button>

<div class="empty"></div>

<button class="control-btn"
ontouchstart="pressKey('ArrowLeft')"
ontouchend="releaseKey('ArrowLeft')">
⬅️
</button>

<button class="control-btn"
ontouchstart="pressKey('ArrowDown')"
ontouchend="releaseKey('ArrowDown')">
⬇️
</button>

<button class="control-btn"
ontouchstart="pressKey('ArrowRight')"
ontouchend="releaseKey('ArrowRight')">
➡️
</button>

</div>

<div class="stats">

<div class="glass rounded-3xl p-4 text-center">
<p class="text-white/60">Score</p>
<h2 id="score" class="text-4xl font-black text-pink-300">0</h2>
</div>

<div class="glass rounded-3xl p-4 text-center">
<p class="text-white/60">Lives</p>
<h2 id="lives" class="text-4xl font-black text-green-300">3</h2>
</div>

<div class="glass rounded-3xl p-4 text-center">
<p class="text-white/60">Best</p>
<h2 id="best" class="text-4xl font-black text-yellow-300">0</h2>
</div>

<div class="glass rounded-3xl p-4 text-center">
<p class="text-white/60">Level</p>
<h2 id="level" class="text-4xl font-black text-cyan-300">1</h2>
</div>

</div>

</div>

</section>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let game="space";
let animation;
let paused=false;

let gameSpeed=1;

let score=0;
let lives=3;
let level=1;

let best=localStorage.getItem("arcadeBest") || 0;

document.getElementById("best").innerText=best;

const keys={};

const player={
x:520,
y:500,
speed:5
};

let stars=[];
let meteors=[];
let traffic=[];
let enemies=[];
let obstacles=[];
let fruits=[];
let bricks=[];

let snake=[];
let snakeDir="RIGHT";
let snakeFood={x:10,y:10};
let snakeTick=0;

let ball={
x:550,
y:400,
dx:4,
dy:-4
};

for(let i=0;i<100;i++){

stars.push({
x:Math.random()*1100,
y:Math.random()*620,
size:Math.random()*2,
speed:1
});

}

function updateUI(){

document.getElementById("score").innerText=score;
document.getElementById("lives").innerText=lives;
document.getElementById("best").innerText=best;
document.getElementById("level").innerText=level;

}

function addScore(v=1){

score+=v;

if(score>best){

best=score;

localStorage.setItem("arcadeBest",best);

}

level=Math.floor(score/25)+1;

updateUI();

}

function damage(){

lives--;

navigator.vibrate?.(80);

updateUI();

if(lives<=0){

setTimeout(()=>{

alert("💀 GAME OVER\n\nScore: "+score);

restartGame();

},100);

}

}

function slowMode(){

gameSpeed=.7;

}

function speedMode(){

gameSpeed=1.2;

}

function startGame(type){

game=type;

document.getElementById("menu").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");

document.getElementById("gameTitle").innerText=
type.toUpperCase();

score=0;
lives=3;
level=1;

player.x=520;
player.y=500;

meteors=[];
traffic=[];
enemies=[];
obstacles=[];
fruits=[];

snake=[
{x:5,y:5},
{x:4,y:5},
{x:3,y:5}
];

snakeDir="RIGHT";

snakeFood={
x:10,
y:10
};

createBricks();

paused=false;

gameSpeed=1;

updateUI();

cancelAnimationFrame(animation);

loop();

}

function loop(){

if(paused) return;

drawBackground();

switch(game){

case "space":
spaceGame();
break;

case "car":
carGame();
break;

case "snake":
snakeGame();
break;

case "brick":
brickGame();
break;

case "pong":
pongGame();
break;

case "combat":
combatGame();
break;

case "runner":
runnerGame();
break;

case "catch":
catchGame();
break;

}

animation=requestAnimationFrame(loop);

}

function drawBackground(){

const g=ctx.createLinearGradient(0,0,0,620);

g.addColorStop(0,"#020617");
g.addColorStop(1,"#312e81");

ctx.fillStyle=g;
ctx.fillRect(0,0,1100,620);

stars.forEach(s=>{

s.y+=s.speed;

if(s.y>620){

s.y=0;
s.x=Math.random()*1100;

}

ctx.fillStyle="white";

ctx.beginPath();
ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
ctx.fill();

});

}

function glow(text,x,y,size=50){

ctx.save();

ctx.font=size+"px Arial";

ctx.shadowColor="#ec4899";
ctx.shadowBlur=15;

ctx.fillStyle="white";

ctx.fillText(text,x,y);

ctx.restore();

}

function movePlayer(){

if(keys["ArrowLeft"]) player.x-=player.speed;
if(keys["ArrowRight"]) player.x+=player.speed;
if(keys["ArrowUp"]) player.y-=player.speed;
if(keys["ArrowDown"]) player.y+=player.speed;

player.x=Math.max(0,Math.min(1040,player.x));
player.y=Math.max(0,Math.min(560,player.y));

}

/* SPACE */

function spaceGame(){

glow("🚀",player.x,player.y,55);

if(Math.random()<0.01){

meteors.push({
x:Math.random()*1040,
y:-40,
speed:(2+level*.2)*gameSpeed
});

}

meteors.forEach((m,index)=>{

m.y+=m.speed;

glow("☄️",m.x,m.y,40);

if(
player.x<m.x+40 &&
player.x+40>m.x &&
player.y<m.y+40 &&
player.y+40>m.y
){

meteors.splice(index,1);

damage();

}

if(m.y>650){

meteors.splice(index,1);

addScore(2);

}

});

movePlayer();

}

/* CAR */

function carGame(){

ctx.fillStyle="#1f2937";
ctx.fillRect(250,0,600,620);

glow("🏎️",player.x,560,55);

if(Math.random()<0.012){

traffic.push({
x:[320,470,620,770][Math.floor(Math.random()*4)],
y:-80,
speed:(3+level*.15)*gameSpeed
});

}

traffic.forEach((c,index)=>{

c.y+=c.speed;

glow("🚗",c.x,c.y,50);

if(
player.x<c.x+40 &&
player.x+40>c.x &&
540<c.y+40 &&
590>c.y
){

traffic.splice(index,1);

damage();

}

if(c.y>650){

traffic.splice(index,1);

addScore(3);

}

});

if(keys["ArrowLeft"]) player.x-=6;
if(keys["ArrowRight"]) player.x+=6;

player.x=Math.max(260,Math.min(780,player.x));

}

/* SNAKE */

function snakeGame(){

snakeTick++;

if(snakeTick<12){
drawSnake();
return;
}

snakeTick=0;

if(keys["ArrowUp"]&&snakeDir!=="DOWN") snakeDir="UP";
if(keys["ArrowDown"]&&snakeDir!=="UP") snakeDir="DOWN";
if(keys["ArrowLeft"]&&snakeDir!=="RIGHT") snakeDir="LEFT";
if(keys["ArrowRight"]&&snakeDir!=="LEFT") snakeDir="RIGHT";

let head={...snake[0]};

if(snakeDir==="RIGHT") head.x++;
if(snakeDir==="LEFT") head.x--;
if(snakeDir==="UP") head.y--;
if(snakeDir==="DOWN") head.y++;

if(head.x<0) head.x=21;
if(head.x>21) head.x=0;
if(head.y<0) head.y=11;
if(head.y>11) head.y=0;

snake.unshift(head);

if(head.x===snakeFood.x&&head.y===snakeFood.y){

addScore(5);

snakeFood={
x:Math.floor(Math.random()*22),
y:Math.floor(Math.random()*12)
};

}else{
snake.pop();
}

drawSnake();

}

function drawSnake(){

snake.forEach((s,index)=>{

ctx.fillStyle=index===0 ? "#ec4899" : "#22c55e";

ctx.fillRect(
s.x*48,
s.y*48,
42,
42
);

});

glow("🍎",snakeFood.x*48,snakeFood.y*48+35,35);

}

/* BRICK */

function createBricks(){

bricks=[];

for(let r=0;r<5;r++){

for(let c=0;c<8;c++){

bricks.push({
x:90+c*110,
y:60+r*50,
alive:true
});

}

}

}

function brickGame(){

glow("🛡️",player.x,580,55);

ball.x+=ball.dx*gameSpeed;
ball.y+=ball.dy*gameSpeed;

ctx.beginPath();
ctx.arc(ball.x,ball.y,12,0,Math.PI*2);
ctx.fillStyle="#60a5fa";
ctx.fill();

if(ball.x<0||ball.x>1100) ball.dx*=-1;
if(ball.y<0) ball.dy*=-1;

if(ball.y>620){

damage();

ball.x=550;
ball.y=400;

}

if(
ball.y>540 &&
ball.x>player.x &&
ball.x<player.x+100
){

ball.dy=-Math.abs(ball.dy);

}

bricks.forEach(b=>{

if(!b.alive) return;

glow("🧱",b.x,b.y,35);

if(
ball.x>b.x &&
ball.x<b.x+40 &&
ball.y>b.y &&
ball.y<b.y+30
){

b.alive=false;

ball.dy*=-1;

addScore(4);

}

});

if(keys["ArrowLeft"]) player.x-=7;
if(keys["ArrowRight"]) player.x+=7;

player.x=Math.max(0,Math.min(1000,player.x));

}

/* PONG */

function pongGame(){

ctx.fillStyle="white";
ctx.fillRect(player.x,560,120,15);

ball.x+=ball.dx*gameSpeed;
ball.y+=ball.dy*gameSpeed;

ctx.beginPath();
ctx.arc(ball.x,ball.y,12,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();

if(ball.x<0||ball.x>1100) ball.dx*=-1;
if(ball.y<0) ball.dy*=-1;

if(ball.y>620){

damage();

ball.x=550;
ball.y=300;

}

if(ball.y>540&&ball.x>player.x&&ball.x<player.x+120){

ball.dy=-4;

addScore();

}

if(keys["ArrowLeft"]) player.x-=7;
if(keys["ArrowRight"]) player.x+=7;

player.x=Math.max(0,Math.min(980,player.x));

}

/* COMBAT */

function combatGame(){

glow("⚔️",player.x,player.y,55);

if(Math.random()<0.01){

enemies.push({
x:Math.random()*1000,
y:-30,
speed:(2+level*.15)*gameSpeed
});

}

enemies.forEach((e,index)=>{

e.y+=e.speed;

glow("👹",e.x,e.y,45);

if(
player.x<e.x+40 &&
player.x+40>e.x &&
player.y<e.y+40 &&
player.y+40>e.y
){

enemies.splice(index,1);

damage();

}

if(e.y>650){

enemies.splice(index,1);

addScore(2);

}

});

movePlayer();

}

/* RUNNER */

function runnerGame(){

ctx.fillStyle="#374151";
ctx.fillRect(0,580,1100,40);

glow("🏃",player.x,560,55);

if(Math.random()<0.012){

obstacles.push({
x:1100,
speed:4*gameSpeed
});

}

obstacles.forEach((o,index)=>{

o.x-=o.speed;

glow("🪨",o.x,570,40);

if(
player.x<o.x+40 &&
player.x+40>o.x &&
player.y>500
){

damage();

obstacles.splice(index,1);

}

if(o.x<-50){

obstacles.splice(index,1);

addScore(2);

}

});

if(keys["ArrowUp"]){
player.y-=6;
}else{
player.y+=4;
}

player.y=Math.min(520,player.y);

if(keys["ArrowLeft"]) player.x-=5;
if(keys["ArrowRight"]) player.x+=5;

}

/* CATCH */

function catchGame(){

glow("🧺",player.x,560,60);

if(Math.random()<0.015){

fruits.push({
x:Math.random()*1000,
y:-20,
emoji:["🍎","🍓","🍌","🍉"][Math.floor(Math.random()*4)],
speed:(2+Math.random()*2)*gameSpeed
});

}

fruits.forEach((f,index)=>{

f.y+=f.speed;

glow(f.emoji,f.x,f.y,35);

if(
player.x<f.x+40 &&
player.x+80>f.x &&
520<f.y+40 &&
570>f.y
){

fruits.splice(index,1);

addScore(2);

}

if(f.y>650){

fruits.splice(index,1);

damage();

}

});

if(keys["ArrowLeft"]) player.x-=6;
if(keys["ArrowRight"]) player.x+=6;

}

/* CONTROLS */

window.addEventListener("keydown",e=>{

keys[e.key]=true;

});

window.addEventListener("keyup",e=>{

keys[e.key]=false;

});

function pressKey(k){

keys[k]=true;

}

function releaseKey(k){

keys[k]=false;

}

function restartGame(){

startGame(game);

}

function togglePause(){

paused=!paused;

if(!paused){
loop();
}

}

function goMenu(){

cancelAnimationFrame(animation);

document.getElementById("game").classList.add("hidden");

document.getElementById("menu").classList.remove("hidden");

}

</script>

</body>
</html>
