<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jackie-Gelic Arcade Universe</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:Arial,sans-serif;
background:#020617;
overflow:hidden;
color:white;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#2563eb66,transparent 30%),
radial-gradient(circle at bottom right,#9333ea66,transparent 30%),
linear-gradient(135deg,#020617,#0f172a,#111827);
z-index:-1;
}

.glass{
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(14px);
}

.gradient{
background:linear-gradient(to right,#60a5fa,#a855f7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

canvas{
width:100%;
max-width:100%;
background:#07111f;
border-radius:25px;
border:2px solid rgba(255,255,255,.1);
}

.hidden{
display:none;
}

.card{
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-8px) scale(1.02);
}

.mobile{
display:none;
}

@media(max-width:768px){

.mobile{
display:flex;
}

}

</style>
</head>
<body>

<!-- MENU -->

<div id="menu"
class="min-h-screen flex items-center justify-center p-6">

<div class="glass rounded-[40px] p-8 w-full max-w-7xl">

<h1 class="text-6xl md:text-8xl font-black gradient text-center">
🎮 HD ARCADE
</h1>

<p class="text-center text-gray-300 mt-4 text-xl">
Choose a Game
</p>

<div class="grid md:grid-cols-3 gap-6 mt-10">

<div onclick="startGame('space')"
class="card glass rounded-3xl p-6 text-center">

<img src="https://cdn-icons-png.flaticon.com/512/3212/3212608.png"
class="w-28 h-28 mx-auto">

<h2 class="text-3xl font-black mt-4">
🚀 Space Escape
</h2>

</div>

<div onclick="startGame('fruit')"
class="card glass rounded-3xl p-6 text-center">

<img src="https://cdn-icons-png.flaticon.com/512/415/415733.png"
class="w-28 h-28 mx-auto">

<h2 class="text-3xl font-black mt-4">
🍉 Fruit Slice
</h2>

</div>

<div onclick="startGame('snake')"
class="card glass rounded-3xl p-6 text-center">

<img src="https://cdn-icons-png.flaticon.com/512/616/616408.png"
class="w-28 h-28 mx-auto">

<h2 class="text-3xl font-black mt-4">
🐍 Snake HD
</h2>

</div>

<div onclick="startGame('combat')"
class="card glass rounded-3xl p-6 text-center">

<img src="https://cdn-icons-png.flaticon.com/512/3048/3048122.png"
class="w-28 h-28 mx-auto">

<h2 class="text-3xl font-black mt-4">
⚔️ Combat Arena
</h2>

</div>

<div onclick="startGame('racing')"
class="card glass rounded-3xl p-6 text-center">

<img src="https://cdn-icons-png.flaticon.com/512/744/744465.png"
class="w-28 h-28 mx-auto">

<h2 class="text-3xl font-black mt-4">
🏎️ Turbo Racing
</h2>

</div>

<div onclick="comingSoon()"
class="card glass rounded-3xl p-6 text-center">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
class="w-28 h-28 mx-auto opacity-70">

<h2 class="text-3xl font-black mt-4">
🔥 Mob-Web Legends
</h2>

<p class="text-gray-400 mt-2">
Coming Soon
</p>

</div>

</div>

</div>

</div>

<!-- GAME -->

<div id="gameScreen"
class="hidden p-5">

<div class="glass rounded-[35px] p-5">

<div class="flex flex-wrap justify-between items-center gap-4 mb-6">

<div>

<h1 id="gameTitle"
class="text-5xl font-black gradient">
GAME
</h1>

<p class="text-gray-400 mt-2">
HD Arcade Universe
</p>

</div>

<div class="flex gap-3 flex-wrap">

<button onclick="restartGame()"
class="bg-blue-600 px-5 py-3 rounded-2xl font-bold">
🔄 Restart
</button>

<button onclick="goMenu()"
class="bg-red-600 px-5 py-3 rounded-2xl font-bold">
🏠 Menu
</button>

</div>

</div>

<canvas id="canvas"
width="1000"
height="550"></canvas>

<!-- MOBILE -->

<div class="mobile justify-center gap-4 mt-5 flex-wrap">

<button onclick="mobileMove('left')"
class="glass w-16 h-16 rounded-2xl text-2xl">
⬅️
</button>

<button onclick="mobileMove('right')"
class="glass w-16 h-16 rounded-2xl text-2xl">
➡️
</button>

<button onclick="mobileMove('up')"
class="glass w-16 h-16 rounded-2xl text-2xl">
⬆️
</button>

<button onclick="mobileMove('down')"
class="glass w-16 h-16 rounded-2xl text-2xl">
⬇️
</button>

<button onclick="attack()"
class="bg-red-600 w-16 h-16 rounded-2xl text-xl">
⚔️
</button>

</div>

<div class="grid md:grid-cols-3 gap-4 mt-6">

<div class="glass rounded-2xl p-5 text-center">
<p class="text-gray-400">Score</p>
<h2 id="score"
class="text-4xl font-black text-blue-400">
0
</h2>
</div>

<div class="glass rounded-2xl p-5 text-center">
<p class="text-gray-400">Level</p>
<h2 id="level"
class="text-4xl font-black text-purple-400">
1
</h2>
</div>

<div class="glass rounded-2xl p-5 text-center">
<p class="text-gray-400">High Score</p>
<h2 id="high"
class="text-4xl font-black text-pink-400">
0
</h2>
</div>

</div>

</div>

</div>

<script>

/* ========================= */
/* GLOBAL */
/* ========================= */

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

let game = "";
let animation;

let score = 0;
let level = 1;

let high =
localStorage.getItem("arcadeHD") || 0;

document.getElementById("high")
.textContent = high;

let keys = {};

window.addEventListener("keydown",e=>{

keys[e.key] = true;

if(game==="snake"){

if(e.key==="ArrowUp" && dy===0){
dx=0;dy=-1;
}

if(e.key==="ArrowDown" && dy===0){
dx=0;dy=1;
}

if(e.key==="ArrowLeft" && dx===0){
dx=-1;dy=0;
}

if(e.key==="ArrowRight" && dx===0){
dx=1;dy=0;
}

}

});

window.addEventListener("keyup",e=>{
keys[e.key] = false;
});

/* ========================= */
/* IMAGES */
/* ========================= */

const playerImg = new Image();
playerImg.src =
"https://cdn-icons-png.flaticon.com/512/6997/6997662.png";

const enemyImg = new Image();
enemyImg.src =
"https://cdn-icons-png.flaticon.com/512/4140/4140047.png";

const carImg = new Image();
carImg.src =
"https://cdn-icons-png.flaticon.com/512/744/744465.png";

const fruitImg = new Image();
fruitImg.src =
"https://cdn-icons-png.flaticon.com/512/590/590685.png";

/* ========================= */
/* SYSTEM */
/* ========================= */

function updateHUD(){

document.getElementById("score")
.textContent = Math.floor(score);

document.getElementById("level")
.textContent = level;

if(score > high){

high = Math.floor(score);

localStorage.setItem(
"arcadeHD",
high
);

document.getElementById("high")
.textContent = high;

}

}

function startGame(type){

cancelAnimationFrame(animation);

game = type;

score = 0;
level = 1;

updateHUD();

document.getElementById("menu")
.classList.add("hidden");

document.getElementById("gameScreen")
.classList.remove("hidden");

if(type==="space"){
initSpace();
}

if(type==="fruit"){
initFruit();
}

if(type==="snake"){
initSnake();
}

if(type==="combat"){
initCombat();
}

if(type==="racing"){
initRacing();
}

}

function restartGame(){

startGame(game);

}

function goMenu(){

cancelAnimationFrame(animation);

document.getElementById("menu")
.classList.remove("hidden");

document.getElementById("gameScreen")
.classList.add("hidden");

}

function comingSoon(){

alert(
"🔥 MOB-WEB LEGENDS\n\nCOMING SOON"
);

}

/* ========================= */
/* SPACE */
/* ========================= */

let ship;
let meteors=[];

function initSpace(){

document.getElementById("gameTitle")
.innerHTML = "🚀 SPACE ESCAPE";

ship = {
x:450,
y:430,
size:80,
speed:6
};

meteors=[];

updateSpace();

}

function updateSpace(){

ctx.fillStyle="#020617";
ctx.fillRect(0,0,1000,550);

for(let i=0;i<80;i++){

ctx.fillStyle="white";

ctx.fillRect(
Math.random()*1000,
Math.random()*550,
2,
2
);

}

ctx.drawImage(
playerImg,
ship.x,
ship.y,
ship.size,
ship.size
);

if(keys.ArrowLeft){
ship.x -= ship.speed;
}

if(keys.ArrowRight){
ship.x += ship.speed;
}

if(Math.random()<0.02){

meteors.push({

x:Math.random()*950,
y:-50,
size:50,
speed:3

});

}

meteors.forEach((m,index)=>{

m.y += m.speed;

ctx.fillStyle="#ef4444";

ctx.beginPath();

ctx.arc(
m.x,
m.y,
25,
0,
Math.PI*2
);

ctx.fill();

if(
ship.x < m.x+30 &&
ship.x+ship.size > m.x &&
ship.y < m.y+30 &&
ship.y+ship.size > m.y
){

alert("💀 Game Over");
restartGame();

}

if(m.y > 600){

meteors.splice(index,1);

score++;

updateHUD();

}

});

animation =
requestAnimationFrame(updateSpace);

}

/* ========================= */
/* FRUIT */
/* ========================= */

let fruits=[];

function initFruit(){

document.getElementById("gameTitle")
.innerHTML = "🍉 FRUIT SLICE";

fruits=[];

updateFruit();

}

function updateFruit(){

ctx.fillStyle="#111827";
ctx.fillRect(0,0,1000,550);

if(Math.random()<0.03){

fruits.push({

x:Math.random()*900,
y:600,
size:70,
speed:2+Math.random()*2

});

}

fruits.forEach((f,index)=>{

f.y -= f.speed;

ctx.drawImage(
fruitImg,
f.x,
f.y,
f.size,
f.size
);

if(f.y < -100){

fruits.splice(index,1);

}

});

animation =
requestAnimationFrame(updateFruit);

}

canvas.addEventListener("click",cutFruit);

function cutFruit(e){

if(game!=="fruit") return;

const rect =
canvas.getBoundingClientRect();

const mx =
e.clientX - rect.left;

const my =
e.clientY - rect.top;

fruits.forEach((f,index)=>{

if(
mx>f.x &&
mx<f.x+f.size &&
my>f.y &&
my<f.y+f.size
){

ctx.fillStyle="red";

for(let i=0;i<20;i++){

ctx.beginPath();

ctx.arc(
f.x+Math.random()*60,
f.y+Math.random()*60,
Math.random()*6,
0,
Math.PI*2
);

ctx.fill();

}

fruits.splice(index,1);

score += 2;

updateHUD();

}

});

}

/* ========================= */
/* SNAKE */
/* ========================= */

let snake=[];
let food;
let dx=1;
let dy=0;

function initSnake(){

document.getElementById("gameTitle")
.innerHTML = "🐍 SNAKE HD";

snake = [
{x:10,y:10},
{x:9,y:10},
{x:8,y:10}
];

food = {
x:20,
y:10
};

dx=1;
dy=0;

updateSnake();

}

function updateSnake(){

ctx.fillStyle="#07111f";
ctx.fillRect(0,0,1000,550);

snake.forEach((s,index)=>{

ctx.fillStyle =
index===0 ? "#4ade80" : "#22c55e";

ctx.beginPath();

ctx.roundRect(
s.x*25,
s.y*25,
22,
22,
10
);

ctx.fill();

});

ctx.fillStyle="#f43f5e";

ctx.beginPath();

ctx.arc(
food.x*25+10,
food.y*25+10,
10,
0,
Math.PI*2
);

ctx.fill();

let head = {

x:snake[0].x + dx,
y:snake[0].y + dy

};

snake.unshift(head);

if(
head.x===food.x &&
head.y===food.y
){

score++;

updateHUD();

food = {

x:Math.floor(Math.random()*35),
y:Math.floor(Math.random()*20)

};

}else{

snake.pop();

}

if(
head.x<0 ||
head.y<0 ||
head.x>39 ||
head.y>21
){

alert("💀 Snake Crashed");
restartGame();

return;

}

setTimeout(updateSnake,120);

}

/* ========================= */
/* COMBAT */
/* ========================= */

let fighter;
let enemy;
let attackNow=false;

function initCombat(){

document.getElementById("gameTitle")
.innerHTML = "⚔️ COMBAT ARENA";

fighter = {

x:150,
y:350,
w:90,
h:90,
hp:100

};

enemy = {

x:700,
y:350,
w:90,
h:90,
hp:100

};

updateCombat();

}

function attack(){

attackNow=true;

}

function updateCombat(){

ctx.fillStyle="#111827";
ctx.fillRect(0,0,1000,550);

ctx.fillStyle="#374151";
ctx.fillRect(0,450,1000,100);

ctx.drawImage(
playerImg,
fighter.x,
fighter.y,
fighter.w,
fighter.h
);

ctx.drawImage(
enemyImg,
enemy.x,
enemy.y,
enemy.w,
enemy.h
);

if(keys.ArrowLeft){
fighter.x -= 4;
}

if(keys.ArrowRight){
fighter.x += 4;
}

if(keys[" "] || attackNow){

ctx.fillStyle="yellow";

ctx.fillRect(
fighter.x+70,
fighter.y+30,
40,
10
);

if(
fighter.x+100 > enemy.x
){

enemy.hp -= .5;

}

attackNow=false;

}

if(enemy.x > fighter.x+100){
enemy.x -= 1.5;
}

if(enemy.x < fighter.x){

enemy.x += 1.5;

}

if(
enemy.x < fighter.x+80 &&
enemy.x+80 > fighter.x
){

fighter.hp -= .05;

}

ctx.fillStyle="red";
ctx.fillRect(50,50,fighter.hp*2,20);

ctx.fillRect(550,50,enemy.hp*2,20);

ctx.fillStyle="white";
ctx.font="20px Arial";

ctx.fillText("PLAYER",50,40);
ctx.fillText("AI ENEMY",550,40);

if(enemy.hp<=0){

score += 20;

alert("🏆 YOU WIN");

restartGame();

}

if(fighter.hp<=0){

alert("💀 YOU LOST");

restartGame();

}

animation =
requestAnimationFrame(updateCombat);

}

/* ========================= */
/* RACING */
/* ========================= */

let car;

function initRacing(){

document.getElementById("gameTitle")
.innerHTML = "🏎️ TURBO RACING";

car = {

x:450,
y:420,
w:100,
h:100

};

updateRacing();

}

function updateRacing(){

ctx.fillStyle="#111827";
ctx.fillRect(0,0,1000,550);

ctx.fillStyle="#374151";
ctx.fillRect(250,0,500,550);

ctx.strokeStyle="white";
ctx.lineWidth=8;

for(let i=0;i<20;i++){

ctx.beginPath();

ctx.moveTo(500,i*60);
ctx.lineTo(500,i*60+30);
ctx.stroke();

}

ctx.drawImage(
carImg,
car.x,
car.y,
car.w,
car.h
);

if(keys.ArrowLeft){
car.x -= 5;
}

if(keys.ArrowRight){
car.x += 5;
}

score += .03;

updateHUD();

animation =
requestAnimationFrame(updateRacing);

}

/* ========================= */
/* MOBILE */
/* ========================= */

function mobileMove(dir){

if(game==="space"){

if(dir==="left"){
ship.x -= 25;
}

if(dir==="right"){
ship.x += 25;
}

}

if(game==="combat"){

if(dir==="left"){
fighter.x -= 25;
}

if(dir==="right"){
fighter.x += 25;
}

}

if(game==="snake"){

if(dir==="up" && dy===0){
dx=0;dy=-1;
}

if(dir==="down" && dy===0){
dx=0;dy=1;
}

if(dir==="left" && dx===0){
dx=-1;dy=0;
}

if(dir==="right" && dx===0){
dx=1;dy=0;
}

}

if(game==="racing"){

if(dir==="left"){
car.x -= 25;
}

if(dir==="right"){
car.x += 25;
}

}

}

</script>

</body>
</html>
