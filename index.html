<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>Jackie& Gelic Arcade Universe</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow-x:hidden;
background:#020617;
font-family:Arial,sans-serif;
color:white;
touch-action:manipulation;
}

body{
background:
radial-gradient(circle at top left,#2563eb55,transparent 30%),
radial-gradient(circle at bottom right,#9333ea55,transparent 30%),
linear-gradient(135deg,#020617,#0f172a,#111827);
}

.glass{
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(14px);
}

.gradient{
background:linear-gradient(to right,#60a5fa,#a855f7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hidden{
display:none;
}

.card{
transition:.25s;
cursor:pointer;
}

.card:hover{
transform:translateY(-8px) scale(1.03);
}

canvas{
width:100%;
max-width:100%;
background:#07111f;
border-radius:22px;
border:2px solid rgba(255,255,255,.08);
display:block;
touch-action:none;
}

.btn{
padding:14px 20px;
border-radius:18px;
font-weight:700;
transition:.2s;
}

.btn:hover{
transform:scale(1.05);
}

.mobile-controls{
display:none;
}

.mobile-btn{
width:70px;
height:70px;
border-radius:20px;
font-size:28px;
font-weight:bold;
}

@media(max-width:768px){

body{
overflow-y:auto;
}

.mobile-controls{
display:flex;
}

h1{
font-size:42px !important;
}

canvas{
height:320px !important;
}

}

</style>
</head>

<body>

<!-- MENU -->

<section id="menu"
class="min-h-screen flex items-center justify-center p-4">

<div class="glass rounded-[35px] p-6 w-full max-w-7xl">

<h1 class="text-7xl font-black gradient text-center">
🎮 HD ARCADE
</h1>

<p class="text-center text-gray-300 mt-4 text-xl">
Ultimate Web Arcade Experience
</p>

<div class="grid md:grid-cols-3 gap-5 mt-10">

<div class="card glass rounded-3xl p-6 text-center"
onclick="startGame('space')">

<img src="https://cdn-icons-png.flaticon.com/512/3212/3212608.png"
class="w-28 h-28 mx-auto" />

<h2 class="text-3xl font-black mt-4">
🚀 Space Escape
</h2>

</div>

<div class="card glass rounded-3xl p-6 text-center"
onclick="startGame('fruit')">

<img src="https://cdn-icons-png.flaticon.com/512/415/415733.png"
class="w-28 h-28 mx-auto" />

<h2 class="text-3xl font-black mt-4">
🍉 Fruit Slice
</h2>

</div>

<div class="card glass rounded-3xl p-6 text-center"
onclick="startGame('snake')">

<img src="https://cdn-icons-png.flaticon.com/512/616/616408.png"
class="w-28 h-28 mx-auto" />

<h2 class="text-3xl font-black mt-4">
🐍 Snake HD
</h2>

</div>

<div class="card glass rounded-3xl p-6 text-center"
onclick="startGame('combat')">

<img src="https://cdn-icons-png.flaticon.com/512/3048/3048122.png"
class="w-28 h-28 mx-auto" />

<h2 class="text-3xl font-black mt-4">
⚔️ Combat Arena
</h2>

</div>

<div class="card glass rounded-3xl p-6 text-center"
onclick="startGame('racing')">

<img src="https://cdn-icons-png.flaticon.com/512/744/744465.png"
class="w-28 h-28 mx-auto" />

<h2 class="text-3xl font-black mt-4">
🏎️ Turbo Racing
</h2>

</div>

<div class="card glass rounded-3xl p-6 text-center opacity-70">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
class="w-28 h-28 mx-auto" />

<h2 class="text-3xl font-black mt-4">
🔥 Coming Soon
</h2>

</div>

</div>

</div>

</section>

<!-- GAME -->

<section id="gameScreen"
class="hidden p-4 min-h-screen">

<div class="glass rounded-[35px] p-4">

<div class="flex flex-wrap gap-4 justify-between items-center mb-5">

<div>

<h1 id="gameTitle"
class="text-5xl font-black gradient">
GAME
</h1>

<p class="text-gray-400 mt-2">
HD Arcade Universe
</p>

</div>

<div class="flex gap-3 flex-wrap">

<button class="btn bg-blue-600"
onclick="restartGame()">
🔄 Restart
</button>

<button class="btn bg-red-600"
onclick="goMenu()">
🏠 Menu
</button>

</div>

</div>

<canvas id="canvas" width="1000" height="550"></canvas>

<!-- MOBILE CONTROLS -->

<div class="mobile-controls justify-center gap-3 flex-wrap mt-5">

<button class="mobile-btn glass"
onclick="mobileMove('left')">
⬅️
</button>

<button class="mobile-btn glass"
onclick="mobileMove('right')">
➡️
</button>

<button class="mobile-btn glass"
onclick="mobileMove('up')">
⬆️
</button>

<button class="mobile-btn glass"
onclick="mobileMove('down')">
⬇️
</button>

<button class="mobile-btn bg-red-600"
onclick="attack()">
⚔️
</button>

</div>

<div class="grid md:grid-cols-3 gap-4 mt-5">

<div class="glass rounded-2xl p-5 text-center">

<p class="text-gray-400">
Score
</p>

<h2 id="score"
class="text-4xl font-black text-blue-400">
0
</h2>

</div>

<div class="glass rounded-2xl p-5 text-center">

<p class="text-gray-400">
Level
</p>

<h2 id="level"
class="text-4xl font-black text-purple-400">
1
</h2>

</div>

<div class="glass rounded-2xl p-5 text-center">

<p class="text-gray-400">
High Score
</p>

<h2 id="high"
class="text-4xl font-black text-pink-400">
0
</h2>

</div>

</div>

</div>

</section>

<script>

/* ========================= */
/* SYSTEM */
/* ========================= */

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let animation;
let game = "";

let score = 0;
let level = 1;

let high = localStorage.getItem("hdArcadeHigh") || 0;

document.getElementById("high").textContent = high;

let keys = {};

function updateHUD(){

document.getElementById("score").textContent = Math.floor(score);
document.getElementById("level").textContent = level;

if(score > high){

high = Math.floor(score);

localStorage.setItem("hdArcadeHigh",high);

document.getElementById("high").textContent = high;

}

}

function clearLoop(){

cancelAnimationFrame(animation);

}

function startGame(type){

clearLoop();

game = type;

score = 0;
level = 1;

updateHUD();

document.getElementById("menu").classList.add("hidden");
document.getElementById("gameScreen").classList.remove("hidden");

if(type==="space") initSpace();
if(type==="fruit") initFruit();
if(type==="snake") initSnake();
if(type==="combat") initCombat();
if(type==="racing") initRacing();

}

function restartGame(){

startGame(game);

}

function goMenu(){

clearLoop();

document.getElementById("menu").classList.remove("hidden");
document.getElementById("gameScreen").classList.add("hidden");

}

/* ========================= */
/* CONTROLS */
/* ========================= */

window.addEventListener("keydown",e=>{

keys[e.key] = true;

if(game==="snake"){

if(e.key==="ArrowUp" && dy===0){
dx=0;dy=-1;
}

if(e.key==="ArrowDown" && dy===0){
dx=0;dy=1;
}

if(e.key==="ArrowLeft" && dx===0){
dx=-1;dy=0;
}

if(e.key==="ArrowRight" && dx===0){
dx=1;dy=0;
}

}

});

window.addEventListener("keyup",e=>{

keys[e.key] = false;

});

/* ========================= */
/* IMAGES */
/* ========================= */

const playerImg = new Image();
playerImg.src =
"https://cdn-icons-png.flaticon.com/512/6997/6997662.png";

const enemyImg = new Image();
enemyImg.src =
"https://cdn-icons-png.flaticon.com/512/4140/4140047.png";

const carImg = new Image();
carImg.src =
"https://cdn-icons-png.flaticon.com/512/744/744465.png";

const fruitImg = new Image();
fruitImg.src =
"https://cdn-icons-png.flaticon.com/512/590/590685.png";

/* ========================= */
/* SPACE ESCAPE */
/* ========================= */

let ship;
let meteors = [];

function initSpace(){

document.getElementById("gameTitle").innerHTML =
"🚀 SPACE ESCAPE";

ship = {
x:450,
y:430,
w:80,
h:80,
speed:7
};

meteors = [];

spaceLoop();

}

function spaceLoop(){

ctx.fillStyle="#020617";
ctx.fillRect(0,0,canvas.width,canvas.height);

for(let i=0;i<70;i++){

ctx.fillStyle="white";

ctx.fillRect(
Math.random()*canvas.width,
Math.random()*canvas.height,
2,
2
);

}

if(keys.ArrowLeft) ship.x -= ship.speed;
if(keys.ArrowRight) ship.x += ship.speed;

ship.x = Math.max(0,Math.min(canvas.width-ship.w,ship.x));

ctx.drawImage(playerImg,ship.x,ship.y,ship.w,ship.h);

if(Math.random()<0.025){

meteors.push({
x:Math.random()*950,
y:-50,
r:25,
speed:4 + Math.random()*3
});

}

meteors.forEach((m,index)=>{

m.y += m.speed;

ctx.fillStyle="#ef4444";

ctx.beginPath();
ctx.arc(m.x,m.y,m.r,0,Math.PI*2);
ctx.fill();

if(
ship.x < m.x+m.r &&
ship.x+ship.w > m.x-m.r &&
ship.y < m.y+m.r &&
ship.y+ship.h > m.y-m.r
){

alert("💀 Game Over");
restartGame();

}

if(m.y > 600){

meteors.splice(index,1);

score++;

updateHUD();

}

});

animation = requestAnimationFrame(spaceLoop);

}

/* ========================= */
/* FRUIT SLICE */
/* ========================= */

let fruits = [];

function initFruit(){

document.getElementById("gameTitle").innerHTML =
"🍉 FRUIT SLICE";

fruits = [];

fruitLoop();

}

function fruitLoop(){

ctx.fillStyle="#111827";
ctx.fillRect(0,0,canvas.width,canvas.height);

if(Math.random()<0.03){

fruits.push({
x:Math.random()*900,
y:600,
size:70,
speed:3 + Math.random()*3
});

}

fruits.forEach((f,index)=>{

f.y -= f.speed;

ctx.drawImage(
fruitImg,
f.x,
f.y,
f.size,
f.size
);

if(f.y < -100){

fruits.splice(index,1);

}

});

animation = requestAnimationFrame(fruitLoop);

}

canvas.addEventListener("click",sliceFruit);
canvas.addEventListener("touchstart",sliceFruitTouch);

function sliceFruit(e){

if(game!=="fruit") return;

const rect = canvas.getBoundingClientRect();

const mx = e.clientX - rect.left;
const my = e.clientY - rect.top;

hitFruit(mx,my);

}

function sliceFruitTouch(e){

if(game!=="fruit") return;

const rect = canvas.getBoundingClientRect();

const touch = e.touches[0];

const mx = touch.clientX - rect.left;
const my = touch.clientY - rect.top;

hitFruit(mx,my);

}

function hitFruit(mx,my){

fruits.forEach((f,index)=>{

if(
mx > f.x &&
mx < f.x+f.size &&
my > f.y &&
my < f.y+f.size
){

fruits.splice(index,1);

score += 2;

updateHUD();

}

});

}

/* ========================= */
/* SNAKE */
/* ========================= */

let snake = [];
let food;
let dx = 1;
let dy = 0;

function initSnake(){

document.getElementById("gameTitle").innerHTML =
"🐍 SNAKE HD";

snake = [
{x:10,y:10},
{x:9,y:10},
{x:8,y:10}
];

food = {
x:20,
y:10
};

dx = 1;
dy = 0;

snakeLoop();

}

function snakeLoop(){

ctx.fillStyle="#07111f";
ctx.fillRect(0,0,canvas.width,canvas.height);

snake.forEach((s,index)=>{

ctx.fillStyle =
index===0 ? "#4ade80" : "#22c55e";

ctx.fillRect(
s.x*25,
s.y*25,
22,
22
);

});

ctx.fillStyle="#f43f5e";

ctx.beginPath();

ctx.arc(
food.x*25+10,
food.y*25+10,
10,
0,
Math.PI*2
);

ctx.fill();

let head = {
x:snake[0].x + dx,
y:snake[0].y + dy
};

if(
head.x < 0 ||
head.y < 0 ||
head.x > 39 ||
head.y > 21
){

alert("💀 Snake Crashed");
restartGame();
return;

}

for(let s of snake){

if(s.x===head.x && s.y===head.y){

alert("💀 Snake Hit Itself");
restartGame();
return;

}

}

snake.unshift(head);

if(head.x===food.x && head.y===food.y){

score++;

updateHUD();

food = {
x:Math.floor(Math.random()*38),
y:Math.floor(Math.random()*20)
};

}else{

snake.pop();

}

setTimeout(snakeLoop,120);

}

/* ========================= */
/* COMBAT */
/* ========================= */

let fighter;
let enemy;
let attackNow = false;

function initCombat(){

document.getElementById("gameTitle").innerHTML =
"⚔️ COMBAT ARENA";

fighter = {
x:120,
y:350,
w:90,
h:90,
hp:100
};

enemy = {
x:720,
y:350,
w:90,
h:90,
hp:100
};

combatLoop();

}

function attack(){

attackNow = true;

}

function combatLoop(){

ctx.fillStyle="#111827";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#374151";
ctx.fillRect(0,450,1000,100);

if(keys.ArrowLeft) fighter.x -= 5;
if(keys.ArrowRight) fighter.x += 5;

fighter.x = Math.max(0,Math.min(910,fighter.x));

ctx.drawImage(
playerImg,
fighter.x,
fighter.y,
fighter.w,
fighter.h
);

ctx.drawImage(
enemyImg,
enemy.x,
enemy.y,
enemy.w,
enemy.h
);

if(keys[" "] || attackNow){

ctx.fillStyle="yellow";

ctx.fillRect(
fighter.x+80,
fighter.y+30,
40,
12
);

if(fighter.x+120 > enemy.x){

enemy.hp -= 0.8;

}

attackNow = false;

}

if(enemy.x > fighter.x+100){
enemy.x -= 1.5;
}

if(enemy.x < fighter.x){
enemy.x += 1.5;
}

if(
enemy.x < fighter.x+80 &&
enemy.x+80 > fighter.x
){

fighter.hp -= 0.08;

}

ctx.fillStyle="red";
ctx.fillRect(40,40,fighter.hp*2,20);

ctx.fillRect(560,40,enemy.hp*2,20);

ctx.fillStyle="white";
ctx.font="20px Arial";

ctx.fillText("PLAYER",40,30);
ctx.fillText("ENEMY",560,30);

if(enemy.hp <= 0){

score += 20;

updateHUD();

alert("🏆 YOU WIN");
restartGame();

}

if(fighter.hp <= 0){

alert("💀 YOU LOST");
restartGame();

}

animation = requestAnimationFrame(combatLoop);

}

/* ========================= */
/* RACING */
/* ========================= */

let car;
let obstacles = [];

function initRacing(){

document.getElementById("gameTitle").innerHTML =
"🏎️ TURBO RACING";

car = {
x:450,
y:420,
w:90,
h:90,
speed:6
};

obstacles = [];

racingLoop();

}

function racingLoop(){

ctx.fillStyle="#111827";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#374151";
ctx.fillRect(250,0,500,550);

ctx.strokeStyle="white";
ctx.lineWidth=8;

for(let i=0;i<20;i++){

ctx.beginPath();

ctx.moveTo(500,i*60);
ctx.lineTo(500,i*60+30);
ctx.stroke();

}

if(keys.ArrowLeft) car.x -= car.speed;
if(keys.ArrowRight) car.x += car.speed;

car.x = Math.max(260,Math.min(650,car.x));

ctx.drawImage(
carImg,
car.x,
car.y,
car.w,
car.h
);

if(Math.random()<0.03){

obstacles.push({
x:280 + Math.random()*340,
y:-100,
w:80,
h:80,
speed:5
});

}

obstacles.forEach((o,index)=>{

o.y += o.speed;

ctx.fillStyle="#ef4444";
ctx.fillRect(o.x,o.y,o.w,o.h);

if(
car.x < o.x+o.w &&
car.x+car.w > o.x &&
car.y < o.y+o.h &&
car.y+car.h > o.y
){

alert("💥 Crash!");
restartGame();

}

if(o.y > 700){

obstacles.splice(index,1);

score++;

updateHUD();

}

});

animation = requestAnimationFrame(racingLoop);

}

/* ========================= */
/* MOBILE */
/* ========================= */

function mobileMove(dir){

if(game==="space"){

if(dir==="left") ship.x -= 25;
if(dir==="right") ship.x += 25;

}

if(game==="combat"){

if(dir==="left") fighter.x -= 25;
if(dir==="right") fighter.x += 25;

}

if(game==="snake"){

if(dir==="up" && dy===0){
dx=0;dy=-1;
}

if(dir==="down" && dy===0){
dx=0;dy=1;
}

if(dir==="left" && dx===0){
dx=-1;dy=0;
}

if(dir==="right" && dx===0){
dx=1;dy=0;
}

}

if(game==="racing"){

if(dir==="left") car.x -= 25;
if(dir==="right") car.x += 25;

}

}

</script>

</body>
</html>
